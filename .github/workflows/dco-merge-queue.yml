name: DCO (merge queue)

# The probot DCO app only fires on pull_request, so the "DCO" required status
# check never appears on the merge queue SHA and the queue stalls. This workflow
# satisfies that check for merge_group events. DCO sign-off was already verified
# on the PR before it entered the queue.

on:
  merge_group:

permissions:
  contents: read

jobs:
  DCO:
    name: DCO
    runs-on: ubuntu-latest
    steps:
      - run: echo "DCO verified on PR"
