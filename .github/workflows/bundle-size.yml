name: Bundle Size

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect inert diff
    runs-on: ubuntu-latest
    outputs:
      inert: ${{ steps.detect.outputs.inert }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: detect
        uses: ./.github/actions/detect-inert-diff

  size:
    name: Size Limit
    needs: changes
    if: needs.changes.outputs.inert != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: andresz1/size-limit-action@94bc357df29c36c8f8d50ea497c3e225c3c95d1d # v1.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          directory: examples/bundle-size
          build_script: size:build
          script: pnpm exec size-limit --json
          package_manager: pnpm
