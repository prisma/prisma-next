name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 0.1.0, 0.1.0-beta.1). Leave empty to auto-calculate."
        required: false
        type: string
      dist-tag:
        description: "npm dist-tag (e.g., latest, dev, beta)"
        required: true
        default: "latest"
        type: string

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish packages to npm
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine version
        id: version
        # Security: Inputs are safe from injection because:
        # 1. They are passed via env: block and accessed as shell variables ($INPUT_VERSION),
        #    not directly interpolated into the script
        # 2. workflow_dispatch can only be triggered by users with write access
        # 3. The job has `if: github.ref == 'refs/heads/main'` which restricts execution to main branch only
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_TAG: ${{ github.event.inputs.dist-tag }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "Using provided version: $INPUT_VERSION"
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
            echo "tag=$INPUT_TAG" >> $GITHUB_OUTPUT
          else
            echo "No version provided, calculating..."
            node scripts/determine-version.ts
          fi

      - name: Set package versions
        run: node scripts/set-version.ts ${{ steps.version.outputs.version }}

      - name: Build packages
        run: pnpm build

      - name: Publish packages
        run: pnpm -r publish --access public --tag ${{ steps.version.outputs.tag }} --no-git-checks
