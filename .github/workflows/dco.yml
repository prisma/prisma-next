name: DCO

# Validates the Developer Certificate of Origin sign-off on every commit. Runs
# on both pull_request and merge_group so the same required "DCO" check is
# present on the PR (deciding eligibility for the queue) and on the merge queue
# SHA (deciding whether the queue merges). The probot DCO app only fires on
# pull_request, which stalled the merge queue; this replaces it.

on:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  DCO:
    name: DCO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Check sign-off on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$BASE_SHA" "$HEAD_SHA"
          failed=0
          for sha in $(git rev-list --no-merges "$BASE_SHA".."$HEAD_SHA"); do
            author_email="$(git show -s --format='%ae' "$sha")"
            signoffs="$(git show -s --format='%(trailers:key=Signed-off-by,valueonly)' "$sha")"
            if printf '%s\n' "$signoffs" | grep -qiF "<$author_email>"; then
              continue
            fi
            failed=1
            subject="$(git show -s --format='%s' "$sha")"
            echo "::error::Commit $sha ($subject) is missing a 'Signed-off-by' trailer matching the author <$author_email>."
          done
          if [ "$failed" -ne 0 ]; then
            echo "DCO check failed. Sign off your commits with 'git commit -s'."
            exit 1
          fi
          echo "All commits are signed off."
