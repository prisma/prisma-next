packages:
  - packages/**
  - examples/*
  - test/**

allowBuilds:
  '@prisma/client@6.18.0': true
  '@prisma/engines@6.18.0': true
  esbuild@0.25.11 || 0.27.2: true
  prisma@6.18.0: true

blockExoticSubdeps: true

catalog:
  '@prisma/dev': 0.19.1
  '@types/node': 24.10.4
  '@vitest/coverage-v8': ^4.0.0
  vitest: ^4.0.16

catalogMode: prefer

cleanupUnusedCatalogs: true

minimumReleaseAge: 1440

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
