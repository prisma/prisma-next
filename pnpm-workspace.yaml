packages:
  - packages/**
  - examples/*
  - test/**
  - '!**/dist-*'

allowBuilds:
  '@prisma/client@6.18.0': true
  '@prisma/engines@6.18.0': true
  esbuild@0.25.11 || 0.27.2: true
  mongodb-memory-server@10.4.3: true
  prisma@6.18.0: true

blockExoticSubdeps: true

catalog:
  '@prisma/dev': 0.19.1
  '@types/node': 24.10.4
  '@types/pg': 8.16.0
  arktype: ^2.1.29
  gray-matter: ^4.0.3
  kysely: 0.28.10
  pg: 8.16.3
  tsdown: 0.18.4
  typescript: 5.9.3
  vite: 7.3.1
  vitest: 4.0.17

cleanupUnusedCatalogs: true

minimumReleaseAge: 1440

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1
