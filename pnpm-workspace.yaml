packages:
  - packages/**
  - examples/*
  - apps/*
  - test/**
  - '!**/dist-*'

allowBuilds:
  '@prisma/client@6.18.0': true
  '@prisma/engines@6.18.0': true
  esbuild@0.25.11 || 0.27.2: true
  mongodb-memory-server@10.4.3: true
  prisma@6.18.0: true

blockExoticSubdeps: true

catalog:
  '@prisma/dev': 0.24.7
  '@types/node': 25.6.0
  '@types/pg': 8.20.0
  arktype: ^2.2.0
  gray-matter: ^4.0.3
  mongodb: ^7.2.0
  mongodb-memory-server: 11.1.0
  pg: 8.20.0
  tsdown: 0.22.0
  tsx: ^4.22.3
  typescript: 5.9.3
  vite: 8.0.13
  vitest: 4.1.6

cleanupUnusedCatalogs: true

minimumReleaseAge: 1440

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - evlog@1.9.0
  - semver@6.3.1
  # Dev-only: pulled transitively by @cursor/sdk (→ @connectrpc/connect-node).
  # Newer undici publishes dropped provenance attestation; 5.29.0 is a
  # legitimate Node.js-team release, not a known compromise.
  - undici@5.29.0
