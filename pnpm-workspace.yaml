packages:
  - packages/**
  - examples/*
  - test/**
  - '!**/dist-*'

allowBuilds:
  '@prisma/client@6.18.0': true
  '@prisma/engines@6.18.0': true
  esbuild@0.25.11 || 0.27.2: true
  mongodb-memory-server@10.4.3: true
  prisma@6.18.0: true

blockExoticSubdeps: true

catalog:
  '@prisma/dev': 0.24.7
  '@types/node': 24.10.4
  '@types/pg': 8.20.0
  arktype: ^2.1.29
  gray-matter: ^4.0.3
  mongodb: ^6.16.0
  mongodb-memory-server: 10.4.3
  pg: 8.20.0
  tsdown: 0.22.0
  typescript: 5.9.3
  vite: 7.3.1
  vitest: 4.1.5

cleanupUnusedCatalogs: true

minimumReleaseAge: 1440

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1
