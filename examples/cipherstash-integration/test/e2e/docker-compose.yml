# Docker compose for the cipherstash live-PG + EQL + ZeroKMS e2e
# harness. Brings up a single Postgres container the test setup
# applies the cipherstash baseline migration (EQL bundle) + the app
# contract-space migration to. Container data lives in a tmpfs so
# every harness boot starts from an empty Postgres.
#
# Container name is `cipherstash-e2e-postgres` to avoid colliding
# with the workspace-root `docker-compose.yaml` (which uses port
# 5433 for the framework e2e suite); this harness uses port 5432
# to match the example app's `.env` `DATABASE_URL=...@localhost:5432/...`.

services:
  postgres:
    image: postgres:16-alpine
    container_name: cipherstash-e2e-postgres
    ports:
      # Bind to a non-standard host port to avoid colliding with a developer's
      # locally installed Postgres on 5432. The harness sets DATABASE_URL to
      # point at this port at runtime.
      - '54329:5432'
    environment:
      POSTGRES_PASSWORD: cipherstash
      POSTGRES_USER: cipherstash
      POSTGRES_DB: cipherstash_e2e
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cipherstash -d cipherstash_e2e']
      interval: 1s
      timeout: 5s
      retries: 30
